<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="logGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8B6340"/>
      <stop offset="60%" stop-color="#5A3E22"/>
      <stop offset="100%" stop-color="#3D2A15"/>
    </radialGradient>
    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c0c0d0"/>
      <stop offset="50%" stop-color="#e8e8f0"/>
      <stop offset="100%" stop-color="#888899"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0a1a"/>

  <!-- Log circle -->
  <circle cx="32" cy="32" r="18" fill="url(#logGrad)"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="6" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>

  <!-- Knife 1 (stuck in top, angled) -->
  <g transform="rotate(-20, 32, 32)" filter="url(#glow)">
    <!-- Handle -->
    <rect x="30" y="4" width="4" height="9" rx="1.5" fill="#2a2a3a"/>
    <!-- Guard -->
    <rect x="29" y="12" width="6" height="2" fill="#777"/>
    <!-- Blade -->
    <polygon points="30.5,14 33.5,14 32.5,4 31.5,4" fill="url(#bladeGrad)"/>
  </g>

  <!-- Knife 2 (stuck at right, rotated) -->
  <g transform="rotate(110, 32, 32)" filter="url(#glow)">
    <rect x="30" y="4" width="4" height="9" rx="1.5" fill="#2a2a3a"/>
    <rect x="29" y="12" width="6" height="2" fill="#777"/>
    <polygon points="30.5,14 33.5,14 32.5,4 31.5,4" fill="url(#bladeGrad)"/>
  </g>

  <!-- Neon rim glow -->
  <circle cx="32" cy="32" r="18" fill="none" stroke="rgba(100,210,255,0.3)" stroke-width="1"/>

  <!-- Title text -->
  <text x="32" y="60" text-anchor="middle" font-family="monospace" font-size="6" font-weight="bold" fill="rgba(100,210,255,0.8)">KNIFE HIT</text>
</svg>
